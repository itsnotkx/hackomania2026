version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      # Cache HuggingFace model downloads between restarts
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  huggingface_cache:
