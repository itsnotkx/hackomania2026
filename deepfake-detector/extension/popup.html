<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h3 { margin: 0 0 12px; font-size: 15px; }
    #status {
      margin-bottom: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #toggleBtn.start { background: #22c55e; color: white; }
    #toggleBtn.stop  { background: #ef4444; color: white; }
    #toggleBtn:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>Deepfake Detector</h3>
  <div id="status">Idle</div>
  <button id="toggleBtn" class="start">Start Detection</button>
  <script src="popup.js"></script>
</body>
</html>
